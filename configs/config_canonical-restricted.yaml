

# ---------------------------------------------------------------------------

# Vehicular Slots Configuration (Indices 0-12)
intersection:
  sumocfg_path: "simulation/Hornbach-Tutorial.sumocfg"  # Path to the SUMO configuration file for this intersection
  sumo_id: "I-TLS"       # The traffic light ID used in the SUMO .net.xml file
  sumo_signal_count: 34        # The total number of signals in the SUMO signal string
  verbose: false                    # Enable debug printing for phase changes
  verbose_phase_selection: false    # Enable detailed priority/score logging
  normalization_bounds:
    max_vehicles_in_lane: 11       # Normalisation bound for vehicle scaling
    max_wait_per_vehicle: 90.0     # Normalisation bound for wait time scaling
    max_light_age: 60.0            # Normalisation bound for time-since-last-change
  timing:
    yellow_steps: 3
    all_red_steps: 1
    crosswalk_extra_red_steps: 3
    red_yellow_steps: 2
    green_steps: 1


# ---------------------------------------------------------------------------
vehicular_slots:
  North/Right:
    sumo_tls_indices: [13]
    max_capacity: 12
    feed_edges:
      - edge_id: "N1_in"
        lane_indices: [1]
      - edge_id: ":N2_in_0"
        lane_indices: [0]
      - edge_id: "N3_in"
        lane_indices: [1]
      - edge_id: ":N4_in_0"
        lane_indices: [0]
      - edge_id: "NW_in"
        lane_indices: [1]
  North/Middle:
    sumo_tls_indices: [8, 9]
    max_capacity: 22
    feed_edges:
      - edge_id: "N1_in"
        lane_indices: [1, 2]
      - edge_id: ":N2_in_0"
        lane_indices: [1, 2]
      - edge_id: "N3_in"
        lane_indices: [2, 3]
      - edge_id: ":N4_in_1"
        lane_indices: [0, 1]
      - edge_id: "N5_in"
        lane_indices: [1, 2]
  North/Left:
    sumo_tls_indices: [10]
    max_capacity: 12
    feed_edges:
      - edge_id: "N1_in"
        lane_indices: [3]
      - edge_id: ":N2_in_0"
        lane_indices: [3]
      - edge_id: "N3_in"
        lane_indices: [4]
      - edge_id: ":N4_in_1"
        lane_indices: [2]
      - edge_id: "N5_in"
        lane_indices: [3]

  East/Right:
    sumo_tls_indices: [12]
    max_capacity: 12
    feed_edges:
      - edge_id: "E1_in"
        lane_indices: [1]
      - edge_id: ":E2_in_0"
        lane_indices: [0]
      - edge_id: "NE_in"
        lane_indices: [1]
  East/Middle:
    sumo_tls_indices: [0]
    max_capacity: 12
    feed_edges:
      - edge_id: "E1_in"
        lane_indices: [2]
      - edge_id: ":E2_in_1"
        lane_indices: [0]
      - edge_id: "E3_in"
        lane_indices: [1]
  East/Left:
    sumo_tls_indices: [1]
    max_capacity: 12
    feed_edges:
      - edge_id: "E1_in"
        lane_indices: [3]
      - edge_id: ":E2_in_1"
        lane_indices: [1]
      - edge_id: "E3_in"
        lane_indices: [2]

  South/Right:
    sumo_tls_indices: [14]
    max_capacity: 12
    feed_edges:
      - edge_id: "S1_in"
        lane_indices: [1]
      - edge_id: ":S2_in_0"
        lane_indices: [0]
      - edge_id: "SE_in"
        lane_indices: [1]
  South/Middle:
    sumo_tls_indices: [2, 3]
    max_capacity: 22
    feed_edges:
      - edge_id: "S1_in"
        lane_indices: [2, 3]
      - edge_id: ":S2_in_1"
        lane_indices: [0, 1]
      - edge_id: "S3_in"
        lane_indices: [1, 2]
  South/Left:
    sumo_tls_indices: [4]
    max_capacity: 12
    feed_edges:
      - edge_id: "S1_in"
        lane_indices: [4]
      - edge_id: ":S2_in_1"
        lane_indices: [2]
      - edge_id: "S3_in"
        lane_indices: [3]

  West/Right:
    sumo_tls_indices: [15]
    max_capacity: 12
    feed_edges:
      - edge_id: "W1_in"
        lane_indices: [1]
      - edge_id: ":W2_in_0"
        lane_indices: [0]
      - edge_id: "SW_in"
        lane_indices: [1]
  West/Middle:
    sumo_tls_indices: [6]
    max_capacity: 12
    feed_edges:
      - edge_id: "W1_in"
        lane_indices: [2]
      - edge_id: ":W2_in_1"
        lane_indices: [0]
      - edge_id: "W3_in"
        lane_indices: [1]
  West/Left:
    sumo_tls_indices: [7]
    max_capacity: 12
    feed_edges:
      - edge_id: "W1_in"
        lane_indices: [3]
      - edge_id: ":W2_in_1"
        lane_indices: [1]
      - edge_id: "W3_in"
        lane_indices: [2]

  # Example of an aggregated canonical slot handling multiple independent physical approaches.
  # Use 'approaches' instead of 'feed_edges' when you have tracks or lanes arriving from
  # opposite ends of the intersection that must decouple their distance-to-stop-line geometries.
  North-South/Track:
    sumo_tls_indices: [5, 11]
    max_capacity: 8
    approaches:
      # --- Approach Chain 1: North Track ---
      - - edge_id: "NT_in"
          lane_indices: [0]
          
      # --- Approach Chain 2: South Track ---
      - - edge_id: "ST_in"
          lane_indices: [0]

