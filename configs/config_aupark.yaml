intersection:
  sumocfg_path: "simulation/Aupark.sumocfg"
  sumo_id: "I-TLS"
  sumo_signal_count: 30
  verbose: false
  verbose_phase_selection: false
  normalization_bounds:
    max_vehicles_in_lane: 11
    max_wait_per_vehicle: 90.0
    max_light_age: 60.0 
  timing:
    yellow_steps: 3
    all_red_steps: 1
    crosswalk_extra_red_steps: 3
    red_yellow_steps: 2
    green_steps: 4

